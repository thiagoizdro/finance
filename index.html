<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#10B981">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <title>Finance App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Tela de Configuração -->
        <div id="config-screen" class="screen active">
            <div class="container">
                <div class="header">
                    <div class="icon">💰</div>
                    <h1>Configuração Financeira</h1>
                    <p>Configure seu regime de trabalho</p>
                </div>

                <div class="card">
                    <div class="form-group">
                        <label>Regime de Trabalho</label>
                        <div class="btn-group">
                            <button class="btn-regime active" data-regime="daily">
                                📅 Diário
                            </button>
                            <button class="btn-regime" data-regime="monthly">
                                📆 Mensal
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label id="rate-label">Valor por Dia (R$)</label>
                        <input type="number" id="rate-input" placeholder="0,00" step="0.01" min="0">
                    </div>

                    <div class="form-group" id="days-group">
                        <label>Dias Trabalhados</label>
                        <input type="number" id="days-input" placeholder="0" min="0" step="1">
                    </div>

                    <button id="save-config" class="btn-primary">
                        💾 Salvar Configuração
                    </button>
                </div>
            </div>
        </div>

        <!-- Tela Dashboard -->
        <div id="dashboard-screen" class="screen">
            <div class="container">
                <!-- Header -->
                <div class="dashboard-header">
                    <div>
                        <h1>💰 Dashboard</h1>
                        <p id="work-info">0 dias trabalhados · R$ 0,00/dia</p>
                    </div>
                    <button id="reset-btn" class="btn-icon">⚙️</button>
                </div>

                <!-- Cards -->
                <div class="grid">
                    <div class="card" data-color="green">
                        <div class="card-icon">💰</div>
                        <div>
                            <div class="card-label">Total Bruto</div>
                            <div class="card-value" id="total-gross">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="card" data-color="red">
                        <div class="card-icon">➖</div>
                        <div>
                            <div class="card-label">Descontos</div>
                            <div class="card-value" id="total-discounts">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="card" data-color="yellow">
                        <div class="card-icon">🤝</div>
                        <div>
                            <div class="card-label">A Receber</div>
                            <div class="card-value" id="total-to-receive">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="card" data-color="blue">
                        <div class="card-icon">✅</div>
                        <div>
                            <div class="card-label">Recuperado</div>
                            <div class="card-value" id="total-recovered">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="card" data-color="purple">
                        <div class="card-icon">⚖️</div>
                        <div>
                            <div class="card-label">Saldo Líquido</div>
                            <div class="card-value" id="net-balance">R$ 0,00</div>
                        </div>
                    </div>
                    <div class="card" data-color="teal">
                        <div class="card-icon">💳</div>
                        <div>
                            <div class="card-label">Saldo Real</div>
                            <div class="card-value" id="real-balance">R$ 0,00</div>
                        </div>
                    </div>
                </div>

                <!-- Botões Dias Trabalhados -->
                <div class="day-buttons" id="day-buttons" style="display:none;">
                    <div class="day-info">
                        <span>Dias Trabalhados: <strong id="days-count">0</strong></span>
                    </div>
                    <div class="day-actions">
                        <button id="add-day" class="btn-day add">➕ Adicionar Dia</button>
                        <button id="remove-day" class="btn-day remove">➖ Remover Dia</button>
                    </div>
                </div>

                <!-- Botão Nova Movimentação -->
                <button id="new-transaction" class="btn-primary btn-full">
                    ➕ Nova Movimentação
                </button>

                <!-- Lista de Transações -->
                <div class="transactions-section">
                    <h2>Últimos Lançamentos</h2>
                    <div id="transactions-list"></div>
                </div>
            </div>
        </div>

        <!-- Modal -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Nova Movimentação</h2>
                    <button id="close-modal" class="btn-close">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Tipo</label>
                        <div class="btn-group">
                            <button class="btn-type active" data-type="personal_discount">
                                👤 Desconto Pessoal
                            </button>
                            <button class="btn-type" data-type="third_party">
                                👥 Terceiro
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Descrição</label>
                        <input type="text" id="modal-description" placeholder="Ex: Aluguel, Empréstimo...">
                    </div>

                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="modal-amount" placeholder="0,00" step="0.01" min="0">
                    </div>

                    <div class="form-group" id="person-group" style="display:none;">
                        <label>Nome da Pessoa</label>
                        <input type="text" id="modal-person" placeholder="Nome completo">
                    </div>

                    <div class="form-group" id="status-group" style="display:none;">
                        <label>Status</label>
                        <div class="btn-group">
                            <button class="btn-status active" data-status="pending">⏳ Pendente</button>
                            <button class="btn-status" data-status="received">✅ Recebido</button>
                        </div>
                    </div>

                    <button id="save-transaction" class="btn-primary btn-full">
                        💾 Salvar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=2"></script>
</body>
</html>
